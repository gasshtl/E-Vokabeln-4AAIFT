<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7570;
    --accent: #2D5A3D;
    --accent-light: #E8F0EB;
    --accent2: #C4622D;
    --accent2-light: #FAF0EB;
    --border: #E2DDD8;
    --correct: #2D5A3D;
    --wrong: #C4622D;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 0.3rem;
  }

  .badge {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-right: 4px;
    letter-spacing: 0.3px;
  }

  /* MODE SELECTOR */
  .mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px;
  }

  .mode-btn {
    padding: 8px 20px;
    border-radius: 50px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
  }

  /* MAIN CARD */
  .card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    position: relative;
  }

  /* Progress */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-right: 12px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 0.82rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* FLASHCARD MODE */
  .flashcard-wrap {
    perspective: 1000px;
    height: 220px;
    cursor: pointer;
    margin: 1rem 0 1.5rem;
  }

  .flashcard-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }

  .flashcard-inner.flipped { transform: rotateY(180deg); }

  .flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    text-align: center;
  }

  .flashcard-front {
    background: var(--accent-light);
    border: 1px solid #C8DDD0;
  }

  .flashcard-back {
    background: var(--accent2-light);
    border: 1px solid #EDD4C4;
    transform: rotateY(180deg);
  }

  .flashcard-word {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .flashcard-hint {
    font-size: 0.82rem;
    color: var(--muted);
  }

  .flashcard-translation {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 0.8rem;
  }

  .flashcard-example {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
    max-width: 90%;
  }

  /* MULTIPLE CHOICE */
  .question-word {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    text-align: center;
    margin: 1rem 0 0.5rem;
  }

  .question-example {
    font-size: 0.88rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .choice-btn {
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-weight: 400;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .choice-btn.correct {
    border-color: var(--correct);
    background: var(--accent-light);
    color: var(--correct);
    font-weight: 600;
  }

  .choice-btn.wrong {
    border-color: var(--wrong);
    background: var(--accent2-light);
    color: var(--wrong);
  }

  .choice-btn:disabled { cursor: default; }

  /* FILL IN */
  .fill-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    outline: none;
    transition: border 0.2s;
    margin-bottom: 10px;
    background: var(--surface);
    color: var(--text);
  }

  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct { border-color: var(--correct); background: var(--accent-light); }
  .fill-input.wrong { border-color: var(--wrong); background: var(--accent2-light); }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 1.2rem;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { border-color: var(--accent); background: var(--accent-light); }

  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .btn-primary:hover { background: #234d34; border-color: #234d34; }

  /* FEEDBACK */
  .feedback {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 8px;
    border-radius: 8px;
    margin-top: 8px;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.correct { color: var(--correct); background: var(--accent-light); }
  .feedback.wrong { color: var(--wrong); background: var(--accent2-light); }

  /* SCORE */
  .score-box {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-bottom: 1rem;
  }

  .score-item {
    font-size: 0.82rem;
    color: var(--muted);
  }

  .score-item span {
    font-weight: 600;
    color: var(--text);
  }

  /* RESULTS */
  .result-card {
    text-align: center;
    padding: 2rem 0;
  }

  .result-number {
    font-family: 'DM Serif Display', serif;
    font-size: 4rem;
    color: var(--accent);
  }

  .result-label {
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .result-missed {
    text-align: left;
    margin-top: 1.5rem;
  }

  .result-missed h3 {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.8rem;
  }

  .missed-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }

  .missed-en { font-weight: 500; }
  .missed-de { color: var(--muted); }

  .topic-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--border);
    color: var(--muted);
    margin-left: 6px;
  }

  /* DIRECTION TOGGLE */
  .dir-toggle {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .dir-toggle button {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .dir-toggle button.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  @media (max-width: 480px) {
    .choices { grid-template-columns: 1fr; }
    header h1 { font-size: 1.8rem; }
    .mode-btn { padding: 8px 12px; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Vocab Quiz</h1>
  <p>Englisch · Unit Vokabeln · 15 Wörter</p>
</header>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('flash')">Karteikarten</button>
  <button class="mode-btn" onclick="setMode('mc')">Multiple Choice</button>
  <button class="mode-btn" onclick="setMode('fill')">Lückentext</button>
</div>

<div class="card" id="main-card">
  <div id="app-content"></div>
</div>

<script>
const vocab = [{"en":"meaningful","de":"bedeutungsvoll","example":"Think of a famous person whose career has helped to make the world a better place and who did something meaningful.","level":"B2","topic":"Career"},{"en":"unwavering","de":"unerschütterlich","example":"Mahatma Gandhi's life itself is an unwavering commitment to bring about positive change in the lives of millions of people.","level":"C1","topic":"Character"},{"en":"perseverance","de":"Beharrlichkeit / Ausdauer","example":"To have an impressive career, one often needs to show perseverance and a high level of self-motivation.","level":"B2","topic":"Character"},{"en":"influential","de":"einflussreich","example":"Beyoncé's fans often don't know if they love or hate following influential female social media influencers.","level":"B2","topic":"Social Media"},{"en":"rarefied","de":"exklusiv / elitär","example":"Beyoncé is currently among the most rarefied status on social media.","level":"C1","topic":"Social Media"},{"en":"niche","de":"Nische","example":"A successful content creator needs to define one's niche to stand out from others.","level":"B2","topic":"Business"},{"en":"unique selling point","de":"Alleinstellungsmerkmal","example":"To have a unique selling point (USP) is a key factor for a million dollar social media career.","level":"B2","topic":"Business"},{"en":"authentic","de":"authentisch / echt","example":"Successful influencers focus on being authentic, genuine, and relatable to their audience.","level":"B2","topic":"Social Media"},{"en":"intuition","de":"Intuition / Bauchgefühl","example":"You have to trust in something — your gut, destiny, life, karma, whatever — and follow your heart and intuition.","level":"B2","topic":"Mindset"},{"en":"dogma","de":"Dogma / starre Lehrmeinung","example":"Don't be trapped by dogma — which is living with the results of other people's thinking.","level":"C1","topic":"Philosophy"},{"en":"internship","de":"Praktikum","example":"Our international internships are the career-launching experiences you're looking for.","level":"B1","topic":"Career"},{"en":"career-counselling","de":"Berufsberatung","example":"One way schools can support students is to offer professional career-counselling.","level":"B2","topic":"Education"},{"en":"foster","de":"fördern","example":"It is important for educational institutions to foster students' talents and interests.","level":"B2","topic":"Education"},{"en":"incorporate","de":"integrieren / einbauen","example":"Beyoncé began to incorporate the most-liked Instagram photo of all time into her social media strategy.","level":"B2","topic":"Media"},{"en":"pay cheque","de":"Gehaltsscheck","example":"Some people just go to work to earn a pay cheque, while others pursue a lifelong ambition.","level":"B2","topic":"Career"}];

let mode = 'flash';
let shuffled = [];
let index = 0;
let flipped = false;
let direction = 'en-de'; // en-de or de-en
let correct = 0;
let wrong = 0;
let missed = [];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', ['flash','mc','fill'][i] === m);
  });
  restart();
}

function restart() {
  shuffled = shuffle(vocab);
  index = 0;
  flipped = false;
  correct = 0;
  wrong = 0;
  missed = [];
  render();
}

function render() {
  if (index >= shuffled.length) { renderResults(); return; }
  const w = shuffled[index];
  const pct = (index / shuffled.length * 100).toFixed(0);

  if (mode === 'flash') renderFlash(w, pct);
  else if (mode === 'mc') renderMC(w, pct);
  else renderFill(w, pct);
}

function progressHTML(pct) {
  return `<div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <span class="progress-label">${index + 1} / ${shuffled.length}</span>
  </div>`;
}

function scoreHTML() {
  return `<div class="score-box">
    <span class="score-item">✓ <span>${correct}</span></span>
    <span class="score-item">✗ <span>${wrong}</span></span>
  </div>`;
}

function renderFlash(w, pct) {
  const front = direction === 'en-de' ? w.en : w.de;
  const back = direction === 'en-de' ? w.de : w.en;
  document.getElementById('app-content').innerHTML = `
    ${progressHTML(pct)}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <div><span class="badge">${w.level}</span><span class="badge" style="background:#F1EFE8;color:#5F5E5A">${w.topic}</span></div>
      <div class="dir-toggle">
        <button class="${direction==='en-de'?'active':''}" onclick="setDir('en-de')">EN→DE</button>
        <button class="${direction==='de-en'?'active':''}" onclick="setDir('de-en')">DE→EN</button>
      </div>
    </div>
    <div class="flashcard-wrap" onclick="flipCard()" id="fc-wrap">
      <div class="flashcard-inner" id="fc-inner">
        <div class="flashcard-front">
          <div class="flashcard-word">${front}</div>
          <div class="flashcard-hint">Tippe zum Umdrehen</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-translation">${back}</div>
          <div class="flashcard-example">"${w.example}"</div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="prevCard()" ${index===0?'disabled':''}>← Zurück</button>
      <button class="btn btn-primary" onclick="nextCard()">Weiter →</button>
    </div>
  `;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('fc-inner').classList.toggle('flipped', flipped);
}

function setDir(d) {
  direction = d;
  flipped = false;
  render();
}

function prevCard() { if (index > 0) { index--; flipped = false; render(); } }
function nextCard() { index++; flipped = false; render(); }

function renderMC(w, pct) {
  const question = direction === 'en-de' ? w.en : w.de;
  const answer = direction === 'en-de' ? w.de : w.en;
  const others = shuffle(vocab.filter(v => v.en !== w.en)).slice(0, 3).map(v => direction === 'en-de' ? v.de : v.en);
  const options = shuffle([answer, ...others]);

  document.getElementById('app-content').innerHTML = `
    ${progressHTML(pct)}
    ${scoreHTML()}
    <div class="dir-toggle" style="justify-content:flex-end;margin-bottom:0.8rem;">
      <button class="${direction==='en-de'?'active':''}" onclick="setDir('en-de')">EN→DE</button>
      <button class="${direction==='de-en'?'active':''}" onclick="setDir('de-en')">DE→EN</button>
    </div>
    <div><span class="badge">${w.level}</span><span class="badge" style="background:#F1EFE8;color:#5F5E5A">${w.topic}</span></div>
    <div class="question-word">${question}</div>
    <div class="question-example">"${w.example}"</div>
    <div class="choices" id="choices">
      ${options.map(o => `<button class="choice-btn" onclick="checkMC(this,'${o.replace(/'/g,"\\'")}','${answer.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
  `;
}

function checkMC(btn, chosen, answer) {
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === answer) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (chosen === answer) {
    btn.classList.add('correct');
    fb.textContent = '✓ Richtig!';
    fb.className = 'feedback show correct';
    correct++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = `✗ Falsch — richtig wäre: ${answer}`;
    fb.className = 'feedback show wrong';
    wrong++;
    missed.push(shuffled[index]);
  }
  setTimeout(() => { index++; render(); }, 1400);
}

function renderFill(w, pct) {
  const question = direction === 'en-de' ? w.de : w.en;
  const answer = direction === 'en-de' ? w.en : w.de;
  const exampleBlank = w.example.replace(new RegExp(w.en, 'gi'), '___________');

  document.getElementById('app-content').innerHTML = `
    ${progressHTML(pct)}
    ${scoreHTML()}
    <div class="dir-toggle" style="justify-content:flex-end;margin-bottom:0.8rem;">
      <button class="${direction==='en-de'?'active':''}" onclick="setDir('en-de')">EN→DE</button>
      <button class="${direction==='de-en'?'active':''}" onclick="setDir('de-en')">DE→EN</button>
    </div>
    <div><span class="badge">${w.level}</span><span class="badge" style="background:#F1EFE8;color:#5F5E5A">${w.topic}</span></div>
    <div class="question-word">${question}</div>
    <div class="question-example">"${exampleBlank}"</div>
    <input class="fill-input" id="fill-in" placeholder="Englisches Wort eingeben..." autocomplete="off" onkeydown="if(event.key==='Enter')checkFill()">
    <div class="feedback" id="feedback"></div>
    <div class="nav-row" style="margin-top:0.8rem;">
      <button class="btn" onclick="skipFill()">Überspringen</button>
      <button class="btn btn-primary" onclick="checkFill()">Prüfen →</button>
    </div>
  `;
  document.getElementById('fill-in').focus();
}

function checkFill() {
  const input = document.getElementById('fill-in');
  const w = shuffled[index];
  const answer = direction === 'en-de' ? w.en : w.de;
  const val = input.value.trim().toLowerCase();
  const fb = document.getElementById('feedback');
  fb.classList.add('show');

  if (val === answer.toLowerCase()) {
    input.classList.add('correct');
    fb.textContent = '✓ Richtig!';
    fb.className = 'feedback show correct';
    correct++;
    setTimeout(() => { index++; render(); }, 1200);
  } else {
    input.classList.add('wrong');
    input.disabled = true;
    fb.textContent = `✗ Falsch — richtig: ${answer}`;
    fb.className = 'feedback show wrong';
    wrong++;
    missed.push(w);
    setTimeout(() => { index++; render(); }, 1800);
  }
}

function skipFill() {
  wrong++;
  missed.push(shuffled[index]);
  index++;
  render();
}

function renderResults() {
  const total = correct + wrong;
  const pct = total ? Math.round(correct / total * 100) : 0;
  const uniqueMissed = missed.filter((v,i,a) => a.findIndex(x=>x.en===v.en)===i);

  document.getElementById('app-content').innerHTML = `
    <div class="result-card">
      <div class="result-number">${pct}%</div>
      <div class="result-label">${correct} von ${total} richtig</div>
      <button class="btn btn-primary" onclick="restart()">Nochmal üben</button>
      ${uniqueMissed.length ? `
      <div class="result-missed">
        <h3>Noch üben (${uniqueMissed.length})</h3>
        ${uniqueMissed.map(v => `
          <div class="missed-item">
            <span class="missed-en">${v.en}<span class="topic-tag">${v.topic}</span></span>
            <span class="missed-de">${v.de}</span>
          </div>`).join('')}
      </div>` : `<p style="color:var(--accent);margin-top:1rem;font-weight:500">Perfekt — alle richtig! 🎉</p>`}
    </div>
  `;
}

restart();
</script>
</body>
</html>
