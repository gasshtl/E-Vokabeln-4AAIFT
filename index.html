<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Quiz · 4AAIFT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7570;
    --accent: #2D5A3D;
    --accent-light: #E8F0EB;
    --accent2: #C4622D;
    --accent2-light: #FAF0EB;
    --border: #E2DDD8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2.4rem; letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }

  .badge {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    margin-right: 4px;
  }
  .badge-gray { background: #F1EFE8; color: #5F5E5A; }

  .mode-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px;
  }
  .mode-btn {
    padding: 8px 18px;
    border-radius: 50px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active { background: var(--accent); color: white; }

  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.2rem;
    justify-content: center;
    max-width: 640px;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
  }

  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .progress-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 4px; margin-right: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }

  .score-box { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 1rem; }
  .score-item { font-size: 0.82rem; color: var(--muted); }
  .score-item span { font-weight: 600; color: var(--text); }

  .flashcard-wrap { perspective: 1000px; height: 230px; cursor: pointer; margin: 1rem 0 1.5rem; }
  .flashcard-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s ease; }
  .flashcard-inner.flipped { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1.5rem; text-align: center;
  }
  .flashcard-front { background: var(--accent-light); border: 1px solid #C8DDD0; }
  .flashcard-back { background: var(--accent2-light); border: 1px solid #EDD4C4; transform: rotateY(180deg); }
  .flashcard-word { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }
  .flashcard-hint { font-size: 0.82rem; color: var(--muted); }
  .flashcard-translation { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 0.8rem; }
  .flashcard-example { font-size: 0.84rem; color: var(--muted); font-style: italic; line-height: 1.5; max-width: 92%; }

  .question-word { font-family: 'DM Serif Display', serif; font-size: 2rem; text-align: center; margin: 1rem 0 0.5rem; }
  .question-example { font-size: 0.87rem; color: var(--muted); text-align: center; font-style: italic; margin-bottom: 1.5rem; line-height: 1.5; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .choice-btn {
    padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .choice-btn.correct { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .choice-btn.wrong { border-color: var(--accent2); background: var(--accent2-light); color: var(--accent2); }
  .choice-btn:disabled { cursor: default; }

  .fill-input {
    width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 1.05rem; outline: none;
    transition: border 0.2s; margin-bottom: 10px; background: var(--surface); color: var(--text);
  }
  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct { border-color: var(--accent); background: var(--accent-light); }
  .fill-input.wrong { border-color: var(--accent2); background: var(--accent2-light); }

  .feedback { text-align: center; font-size: 0.9rem; font-weight: 500; padding: 8px; border-radius: 8px; margin-top: 8px; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { color: var(--accent); background: var(--accent-light); }
  .feedback.wrong { color: var(--accent2); background: var(--accent2-light); }

  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 1.2rem; }
  .btn {
    padding: 10px 22px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); background: var(--accent-light); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: #234d34; border-color: #234d34; }

  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; flex-wrap: wrap; gap: 6px; }
  .dir-toggle { display: flex; gap: 6px; align-items: center; }
  .dir-toggle button {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
    cursor: pointer; color: var(--muted); transition: all 0.15s;
  }
  .dir-toggle button.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .result-card { text-align: center; padding: 1.5rem 0; }
  .result-number { font-family: 'DM Serif Display', serif; font-size: 4rem; color: var(--accent); }
  .result-label { color: var(--muted); margin-bottom: 1.5rem; }
  .result-missed { text-align: left; margin-top: 1.5rem; }
  .result-missed h3 { font-size: 0.82rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.8rem; }
  .missed-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; gap: 8px; }
  .missed-en { font-weight: 500; }
  .missed-de { color: var(--muted); text-align: right; }

  @media (max-width: 480px) {
    .choices { grid-template-columns: 1fr; }
    header h1 { font-size: 1.8rem; }
    .mode-btn { padding: 7px 11px; font-size: 0.8rem; }
  }
</style>
</head>

  <p>Englisch · 4AAIFT · <span id="count-label">80 Vokabeln</span></p>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('flash')">Karteikarten</button>

<div class="filter-bar" id="filter-bar"></div>

<div class="card"><div id="app-content"></div></div>

B2","topic":"Business"},{"en":"funding","de":"Finanzierung","example":"The aim is to get enough pre-sales to fund the development of the product.","level":"B2","topic":"Business"},{"en":"invest","de":"investieren","example":"Modern media make it easier than ever before for an entrepreneur to find people willing to invest in a start-up.","level":"B1","topic":"Business"},{"en":"start-up","de":"Start-up-Unternehmen","example":"A feature which makes a start-up stand out from all competing businesses is its USP.","level":"B1","topic":"Business"},{"en":"innovative","de":"innovativ","example":"The idea is that customers commit to buying an innovative new product in advance.","level":"B2","topic":"Business"},{"en":"manufacturing","de":"Herstellung","example":"The costs include renting a workshop, materials and the manufacturing process itself.","level":"B2","topic":"Business"},{"en":"venture capital","de":"Risikokapital","example":"Venture capitalists are wealthy people or organisations with surplus money who are seeking start-ups to invest in.","level":"C1","topic":"Business"},{"en":"surplus","de":"Überschuss","example":"Venture capitalists look for opportunities to invest their surplus money.","level":"C1","topic":"Economics"},{"en":"share","de":"Anteil","example":"Investors buy a stake in the company and take a share of future profits.","level":"B1","topic":"Business"},{"en":"risk","de":"Risiko","example":"Investors carry a large part of the financial risk.","level":"B1","topic":"Business"},{"en":"sales pitch","de":"Verkaufsgespräch / Präsentation","example":"To attract investors, an entrepreneur will need to give a convincing sales pitch.","level":"B2","topic":"Business"},{"en":"return","de":"Rendite / Gegenleistung","example":"Investors need to know what investment is required and what will be offered in return.","level":"B2","topic":"Business"},{"en":"unique selling proposition","de":"Alleinstellungsmerkmal","example":"If the entrepreneur chooses to fund the start-up, on responsibility","de":"Verantwortung übernehmen","example":"One of the main aims is to empower young people to take on an active role in society.","level":"B2","topic":"General"},{"en":"hindsight","de":"Rückschau / nachträgliche Einsicht","example":"With the benefit of hindsight, hopefully our mistakes will help other crowdfunders to get it right.","level":"C1","topic":"General"},{"en":"vaping","de":"Dampfen (E-Zigaretten)","example":"The index looks at the regulation of food, soft drinks, vaping and tobacco.","level":"B1","topic":"General"},{"en":"draconian","de":"drakonisch / sehr streng","example":"The Czech Republic has recently introduced draconian smoking bans.","level":"C1","topic":"Law"},{"en":"stake","de":"Beteiligung / Anteil","example":"Venture capitalists buy a stake in the company in exchange for funding.","level":"C1","topic":"Business"},{"en":"convincing","de":"überzeugend","example":"You need to give a convincing sales pitch to attract investors.","level":"B2","topic":"Business"},{"en":"competing","de":"konkurrierend","example":"A USP is a feature that makes a product stand out from all competing businesses.","level":"B2","topic":"Business"},{"en":"to commit money","de":"Geld zusagen / festlegen","example":"The entrepreneur sets a target before investors are prepared to commit money to a project.","level":"B2","topic":"Business"},{"en":"retail price","de":"Verkaufspreis","example":"The retail price of each pair of speakers will be around £150.","level":"B1","topic":"Business"},{"en":"eco-conscious","de":"umweltbewusst","example":"We design funky, modern, eco-conscious electronic products.","level":"B2","topic":"Business"},{"en":"to fuel","de":"anheizen / schüren","example":"High prices fuel the black market for cigarettes.","level":"B2","topic":"Economics"},{"en":"to engage in","de":"sich engagieren in / beteiligen an","example":"Students were invited to engage in a dialogue with the President of the European Commission.","level":"B2","topic":"Politics"}];

const topics = [...new Set(allVocab.map(v => v.topic))].sort();
let activeTopic = 'all';
let mode = 'flash';
let shuffled = [];
let index = 0;
let flipped = false;
let direction = 'en-de';
let correct = 0;
let wrong = 0;
let missed = [];

function getVocab() {
  return activeTopic === 'all' ? allVocab : allVocab.filter(v => v.topic === activeTopic);
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-btn active" onclick="setTopic('all')">Alle (${allVocab.length})</button>` +
    topics.map(t => {
      const c = allVocab.filter(v => v.topic === t).length;
      return `<button class="filter-btn" onclick="setTopic('${t}')">${t} (${c})</button>`;
    }).join('');
}

function setTopic(t) {
  activeTopic = t;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(t === 'all' ? 'Alle' : t));
  });
  restart();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', ['flash','mc','fill'][i] === m);
  });
  restart();
}

function restart() {
  shuffled = shuffle(getVocab());
  index = 0; flipped = false; correct = 0; wrong = 0; missed = [];
  document.getElementById('count-label').textContent = shuffled.length + ' Vokabeln';
  render();
}

function render() {
  if (index >= shuffled.length) { renderResults(); return; }
  const w = shuffled[index];
  const pct = (index / shuffled.length * 100).toFixed(0);
  if (mode === 'flash') renderFlash(w, pct);
  else if (mode === 'mc') renderMC(w, pct);
  else renderFill(w, pct);
}

function progressHTML(pct) {
  return `<div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <span class="progress-label">${index + 1} / ${shuffled.length}</span>
  </div>`;
}

function metaHTML(w) {
  return `<div class="meta-row">
    <div><span class="badge">${w.level}</span><span class="badge badge-gray">${w.topic}</span></div>
    <div class="dir-toggle">
      <button class="${direction==='en-de'?'active':''}" onclick="setDir('en-de')">EN→DE</button>
      <button class="${direction==='de-en'?'active':''}" onclick="setDir('de-en')">DE→EN</button>
    </div>
  </div>`;
}

function scoreHTML() {
  return `<div class="score-box"><span class="score-item">✓ <span>${correct}</span></span><span class="score-item">✗ <span>${wrong}</span></span></div>`;
}

function renderFlash(w, pct) {
  const front = direction === 'en-de' ? w.en : w.de;
  const back  = direction === 'en-de' ? w.de : w.en;
  document.getElementById('app-content').innerHTML = `
    ${progressHTML(pct)}
    ${metaHTML(w)}
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard-inner" id="fc-inner">
        <div class="flashcard-front">
          <div class="flashcard-word">${front}</div>
          <div class="flashcard-hint">Tippe zum Umdrehen</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-translation">${back}</div>
          <div class="flashcard-example">"${w.example}"</div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="prevCard()" ${index===0?'disabled':''}>← Zurück</button>
      <button class="btn btn-primary" onclick="nextCard()">Weiter →</button>
    </div>`;
}

function flipCard() { flipped = !flipped; document.getElementById('fc-inner').classList.toggle('flipped', flipped); }
function setDir(d) { direction = d; flipped = false; render(); }
function prevCard() { if (index > 0) { index--; flipped = false; render(); } }
function nextCard() { index++; flipped = false; render(); }

function renderMC(w, pct) {
  const question = direction === 'en-de' ? w.en : w.de;
  const answer   = direction === 'en-de' ? w.de : w.en;
  const pool = allVocab.filter(v => v.en !== w.en);
  const others = shuffle(pool).slice(0, 3).map(v => direction === 'en-de' ? v.de : v.en);
  const options = shuffle([answer, ...others]);
  const esc = s => s.replace(/'/g,"\\'");
  document.getElementById('app-content').innerHTML = `
    ${progressHTML(pct)}
    ${scoreHTML()}
    ${metaHTML(w)}
    <div class="question-word">${question}</div>
    <div class="question-example">"${w.example}"</div>
    <div class="choices">
      ${options.map(o => `<button class="choice-btn" onclick="checkMC(this,'${esc(o)}','${esc(answer)}')">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>`;
}

function checkMC(btn, chosen, answer) {
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === answer) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (chosen === answer) {
    btn.classList.add('correct');
    fb.textContent = '✓ Richtig!'; fb.className = 'feedback show correct'; correct++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = '✗ Falsch — richtig: ' + answer; fb.className = 'feedback show wrong';
    wrong++; missed.push(shuffled[index]);
  }
  setTimeout(() => { index++; render(); }, 1400);
}

function renderFill(w, pct) {
  const question = direction === 'en-de' ? w.de : w.en;
  const answer   = direction === 'en-de' ? w.en : w.de;
  const blank = w.example.replace(new RegExp(w.en.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), '___________');
  document.getElementById('app-content').innerHTML = `
    ${progressHTML(pct)}
    ${scoreHTML()}
    ${metaHTML(w)}
    <div class="question-word">${question}</div>
    <div class="question-example">"${blank}"</div>
    <input class="fill-input" id="fill-in" placeholder="Englisches Wort eingeben..." autocomplete="off" onkeydown="if(event.key==='Enter')checkFill()">
    <div class="feedback" id="feedback"></div>
    <div class="nav-row" style="margin-top:0.8rem;">
      <button class="btn" onclick="skipFill()">Überspringen</button>
      <button class="btn btn-primary" onclick="checkFill()">Prüfen →</button>
    </div>`;
  document.getElementById('fill-in').focus();
}

function checkFill() {
  const input = document.getElementById('fill-in');
  const w = shuffled[index];
  const answer = direction === 'en-de' ? w.en : w.de;
  const val = input.value.trim().toLowerCase();
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (val === answer.toLowerCase()) {
    input.classList.add('correct');
    fb.textContent = '✓ Richtig!'; fb.className = 'feedback show correct'; correct++;
    setTimeout(() => { index++; render(); }, 1200);
  } else {
    input.classList.add('wrong'); input.disabled = true;
    fb.textContent = '✗ Falsch — richtig: ' + answer; fb.className = 'feedback show wrong';
    wrong++; missed.push(w);
    setTimeout(() => { index++; render(); }, 1800);
  }
}

function skipFill() { wrong++; missed.push(shuffled[index]); index++; render(); }

function renderResults() {
  const total = correct + wrong;
  const pct = total ? Math.round(correct / total * 100) : 0;
  const uniqueMissed = missed.filter((v,i,a) => a.findIndex(x=>x.en===v.en)===i);
  document.getElementById('app-content').innerHTML = `
    <div class="result-card">
      <div class="result-number">${pct}%</div>
      <div class="result-label">${correct} von ${total} richtig</div>
      <button class="btn btn-primary" onclick="restart()">Nochmal üben</button>
      ${uniqueMissed.length ? `
        <div class="result-missed">
          <h3>Noch üben (${uniqueMissed.length})</h3>
          ${uniqueMissed.map(v => `
            <div class="missed-item">
              <span class="missed-en">${v.en} <span class="badge badge-gray" style="font-size:0.65rem">${v.topic}</span></span>
              <span class="missed-de">${v.de}</span>
            </div>`).join('')}
        </div>` : '<p style="color:var(--accent);margin-top:1.2rem;font-weight:500">Perfekt — alle richtig! 🎉</p>'}
    </div>`;
}

buildFilters();
restart();
</script>
</body>
</html>
